<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Explore Hotels | ROYAL HOTELS</title>
  <link rel="icon" href="assets/hotel logo.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
   .hotel__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2rem;
  margin: 2rem auto;
  max-width: 1200px;   /* keeps cards centered */
  padding: 0 1rem;
}

   .hotel__card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,.08);
  overflow: hidden;
  transition: transform .2s;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

    .hotel__card:hover { transform: translateY(-4px); }
    .hotel__card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .hotel__card h3 { margin: .75rem 1rem 0; }
    .hotel__card p { margin: .25rem 1rem; }
    .hotel__actions {
      display: flex;
      gap: .5rem;
      padding: 1rem;
    }
    .btn {
      flex: 1;
      text-align: center;
      padding: .5rem;
      border: none;
      border-radius: .5rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-view { background:#d2b48c; color:#fff; }
    .btn-book { background:#00e5ff; color:#000; }
    /* modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right:0; bottom:0;
      background: rgba(0,0,0,0.5);
      justify-content:center;
      align-items:center;
    }
    .modal-content {
      background:#fff;
      padding:2rem;
      border-radius:12px;
      width:100%;
      max-width:400px;
      box-shadow:0 6px 20px rgba(0,0,0,.2);
    }
    .close-btn {
      float:right;
      cursor:pointer;
      font-size:20px;
    }
    
  </style>
  
   <script src="assets/js/app.js"></script>
  <script src="assets/js/data.js"></script>
<script src="assets/js/explore.js"></script>
<script src="assets/js/navbar.js"></script>


</head>
<body>
  <h2 style="text-align:center;">Explore Hotels</h2>
  <div id="hotel-list" class="hotel__grid"></div>

  <!-- Booking Modal -->
  <div id="bookingModal" class="modal">
    <div class="modal-content">
      <span onclick="closeModal()" class="close-btn">&times;</span>
      <h3>Book Your Stay at <span id="modalHotelName"></span></h3>
      <label>Check-In Date:</label>
      <input type="date" id="checkIn"><br><br>
      <label>Check-Out Date:</label>
      <input type="date" id="checkOut"><br><br>
      <button id="confirmBooking">Confirm Booking</button>
    </div>
  </div>

</body>
</html>
