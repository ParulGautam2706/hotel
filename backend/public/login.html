<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | ROYAL HOTELS</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/png" href="assets/hotel logo.png">
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/script.js" defer></script>
    <script src="assets/js/data.js" defer></script>
      <script src="assets/js/login.js" defer></script>

</head>
<body class="auth-page">

    <!-- Login Card -->
    <div class="auth-card" id="login-card">
      <h2>🔑 Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p class="toggle-text">
        Don’t have an account? <a href="#" onclick="showRegister()">Register</a>
      </p>
    </div>

    <!-- Register Card -->
    <div class="auth-card hidden" id="register-card">
      <h2>📝 Register</h2>
      <form id="registerForm">
        <input type="text" id="regName" placeholder="Name" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <button type="submit">Register</button>
      </form>
      <p class="toggle-text">
        Already have an account? <a href="#" onclick="showLogin()">Login</a>
      </p>
    </div>

  </div>
</body>
<script>function showRegister() {
  document.getElementById("login-card").classList.add("hidden");
  document.getElementById("register-card").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("register-card").classList.add("hidden");
  document.getElementById("login-card").classList.remove("hidden");
}
</script>
</html>
